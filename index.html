<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Becca´s Frames</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
    :root {
    --primary: #ff00ff; 
    --secondary: #00f3ff; 
    --bg: #050505;
    --border: rgba(255, 0, 255, 0.3);
    }
    body {
    background: var(--bg);
      font-family: 'Nunito', sans-serif;
    color: #fff;
    cursor: none;
  }

  /* Scanlines Cyberpunk */
  body::after {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 3px, 3px 100%;
    z-index: 500; pointer-events: none;
    opacity: 0.3;
  }

  .magic-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle at center, rgba(255, 0, 255, 0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .title {
    position: absolute; top: 40px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 8px;
    z-index: 10;
    text-shadow: 0 0 15px var(--primary);
    animation: glitch 3s infinite;
  }

  @keyframes glitch {
    0% { text-shadow: 3px 0 var(--secondary), -3px 0 var(--primary); }
    25% { text-shadow: -2px 0 var(--secondary), 2px 0 var(--primary); }
    50% { text-shadow: 2px -3px var(--secondary), -2px 3px var(--primary); }
    100% { text-shadow: 3px 0 var(--secondary), -3px 0 var(--primary); }
  }

  .stage {
    position: absolute; top: 55%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 30px; animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-20px); }
  }

  .pika-frame {
    position: relative; z-index: 3;
    width: 280px; height: 280px;
    border-radius: 50%; overflow: hidden;
    border: 4px solid #fff;
    box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
    background: #000;
  }

  .pika-frame::after {
    content: ''; position: absolute; inset: -10px;
    background: conic-gradient(from 0deg, transparent, var(--primary), var(--secondary), transparent);
    animation: rotateGlow 4s linear infinite;
    filter: blur(15px); z-index: -1;
  }

  @keyframes rotateGlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .pika-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* Panel de Servicios Cyber */
  .services-panel {
    text-align: center;
    background: rgba(255, 0, 255, 0.05);
    padding: 20px 40px;
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    backdrop-filter: blur(10px);
    font-family: 'Orbitron', sans-serif;
  }

  .services-panel b { 
    color: var(--secondary); 
    display: block; 
    margin-bottom: 10px; 
    font-size: 0.7rem; 
    letter-spacing: 3px; 
  }

  .services-panel p {
    font-size: 0.9rem;
    color: #fff;
    line-height: 1.8;
    letter-spacing: 1px;
    font-family: 'Nunito', sans-serif;
    min-height: 5.4em; /* Evita que el panel salte al escribir */
    visibility: hidden; /* Oculto hasta que inicie el efecto */
  }

  /* Cursor parpadeante estilo terminal */
  .cursor {
    display: inline-block;
    background-color: var(--secondary);
    width: 8px; height: 1.2em;
    margin-left: 4px; vertical-align: middle;
    animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Sparkles Cyber */
  .sparkle {
    position: fixed; width: 4px; height: 4px; background: var(--secondary);
    border-radius: 50%; pointer-events: none; z-index: 9999;
    box-shadow: 0 0 10px var(--secondary);
    animation: sparkleAnim 0.8s linear forwards;
  }

  @keyframes sparkleAnim { to { transform: scale(0) translateY(20px); opacity: 0; } }

  .heart { position: absolute; font-size: 15px; opacity: 0.4; animation: fall 8s linear infinite; top: -50px; color: var(--primary); }
  @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="magic-glow"></div>
  <div class="title">Becca´s Frames</div>

  <div class="stage">
    <div class="pika-frame">
      <img src="https://i.imgur.com/4ovF5ui.gif" alt="Frieren Cyber" referrerpolicy="no-referrer">
    </div>

    <div class="services-panel">
      <b>// ACCESS_GRANTED // SERVICES</b>
      <p>
        Frames Personalizados Premium<br>
        Edición de GIFs Anime Style<br>
        Packs Exclusivos Staff & Salas
      </p>
    </div>
  </div>

  <script>
    // Función para generar el sonido HUD de computadora
    function playHUDSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine'; // Sonido suave
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Tono agudo inicial
        oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1); // Caída tipo HUD

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.01); // Volumen muy bajo (suave)
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
      } catch (e) {
        console.log("Audio no soportado");
      }
    }

    function initTypewriter() {
      const p = document.querySelector('.services-panel p');
      const textContent = [
        "Frames Personalizados Premium",
        "Edición de GIFs Anime Style",
        "Packs Exclusivos Staff & Salas"
      ];
      
      p.style.visibility = "visible";
      p.innerHTML = "";
      
      let line = 0;
      let char = 0;

      function type() {
        if (line < textContent.length) {
          if (char < textContent[line].length) {
            // Quitamos el cursor viejo, añadimos letra y ponemos cursor nuevo
            p.innerHTML = p.innerHTML.replace('<span class="cursor"></span>', '') 
                        + textContent[line][char] 
                        + '<span class="cursor"></span>';
            char++;
            setTimeout(type, 40);
          } else {
            p.innerHTML = p.innerHTML.replace('<span class="cursor"></span>', '') + '<br><span class="cursor"></span>';
            line++;
            char = 0;
            setTimeout(type, 500); // Pausa entre líneas
          }
        }
      }
      type();
    }

    function createHearts() {
      for(let i=0; i<15; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = Math.random() > 0.5 ? '✦' : '✧';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
        document.body.appendChild(heart);
      }
    }

    let initialized = false;
    document.addEventListener('mousemove', (e) => {
      // Inicializar sonido en el primer movimiento (bypass de políticas de navegador)
      if (!initialized) {
        playHUDSound();
        initialized = true;
      }

      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = e.clientX + 'px';
      sparkle.style.top = e.clientY + 'px';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 800);
    });

    createHearts();
    window.onload = initTypewriter;
  </script>
</body>
</html>
