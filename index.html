<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Becca´s Frames — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #b39ddb;
      --secondary: #ff85a1;
      --bg: #fcf4ff;
      --surface: #ffffff;
      --text: #4a148c;
      --border: #e1bee7;
      --radius: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      line-height: 1.6;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(180deg, #f3e5f5 0%, var(--bg) 100%);
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: var(--secondary);
      text-shadow: 3px 3px 0px #fff;
      margin-bottom: 10px;
    }

    .services {
      max-width: 800px;
      margin: -30px auto 40px;
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(179, 157, 219, 0.2);
      text-align: center;
      border: 2px dashed var(--border);
    }

    .services b { color: var(--secondary); text-transform: uppercase; font-size: 0.8rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 15px;
      border: 1px solid var(--border);
      transition: transform 0.3s;
      text-align: center;
    }

    .card:hover { transform: translateY(-10px); }

    .preview-box {
      width: 100%;
      height: 200px;
      background: #eee;
      border-radius: 15px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .preview-box img { width: 100%; height: 100%; object-fit: cover; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--secondary); }

    .btn-view { background: #f3e5f5; color: var(--primary); margin-top: 5px; }
  </style>
</head>
<body>

  <header>
    <h1>Becca´s Frames</h1>
    <p>Diseños exclusivos para tu Xat</p>
  </header>

  <div class="services">
    <b>Servicios Premium</b>
    <p>Frames Personalizados • Webs de Juegos • Edición de GIFs Anime</p>
  </div>

  <main class="grid" id="main-grid"></main>

  <script>
    // Base URL de tu GitHub Pages
    const BASE_URL = "https://beccats2.github.io/Galeria";

    const frames = [
      { 
        name: "Frieren Mágica", 
        file: "anime-personal.html", 
        thumb: "https://i.imgur.com/4ovF5ui.gif" 
      },
      { 
        name: "Pikachu Clásico", 
        file: "pikachu.html", 
        thumb: "https://i.imgur.com/3pS9S6D.gif" 
      }
    ];

    const grid = document.getElementById('main-grid');

    frames.forEach(f => {
      const fullUrl = `${BASE_URL}/${f.file}`;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="preview-box"><img src="${f.thumb}" referrerpolicy="no-referrer"></div>
        <h3>${f.name}</h3>
        <button class="btn" onclick="copyLink('${fullUrl}')">Copiar Link para Xat</button>
        <a href="${f.file}" class="btn btn-view" target="_blank">Previsualizar</a>
      `;
      grid.appendChild(card);
    });

    function copyLink(url) {
      navigator.clipboard.writeText(url);
      alert("¡URL absoluta copiada! Ya puedes pegarla en tu Xat.");
    }
  </script>
</body>
</html>
